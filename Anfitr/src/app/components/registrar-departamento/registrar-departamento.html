<div class="fixed inset-0 bg-white z-50 overflow-y-auto">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-2xl w-full max-w-2xl p-8 relative border-2 border-gray-200">
      <!-- Botón Cerrar -->
      <button
        (click)="cerrarModal()"
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">
        ×
      </button>

      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold mb-2" style="color: #152C5B;">
          <span>Anfi</span><span style="color: #3252DF;">tr</span>
        </h2>
        <p class="text-gray-600 text-lg">Registra tu departamento</p>
      </div>

      <!-- Indicador de Paso -->
      <div class="flex items-center justify-center mb-8">
        <div class="flex items-center">
          <div
            [class]="paso === 1 ? 'bg-blue-500 text-white' : 'bg-gray-300 text-gray-700'"
            class="w-10 h-10 rounded-full flex items-center justify-center font-bold">
            1
          </div>
          <div class="w-16 h-1 bg-gray-300 mx-2"></div>
          <div
            [class]="paso === 2 ? 'bg-blue-500 text-white' : 'bg-gray-300 text-gray-700'"
            class="w-10 h-10 rounded-full flex items-center justify-center font-bold">
            2
          </div>
        </div>
      </div>

      <!-- Formulario Paso 1 -->
      <form *ngIf="paso === 1" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Nombre de la propiedad <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="nombrePropiedad"
            name="nombrePropiedad"
            class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ej: Departamento en el centro">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Dirección <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="direccion"
            name="direccion"
            class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Calle y número">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Ciudad <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              [(ngModel)]="ciudad"
              name="ciudad"
              class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Ciudad">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Código Postal <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              [(ngModel)]="codigoPostal"
              name="codigoPostal"
              class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="12345">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Descripción <span class="text-red-500">*</span>
          </label>
          <textarea
            [(ngModel)]="descripcion"
            name="descripcion"
            rows="4"
            class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Describe tu propiedad..."></textarea>
        </div>

        <div class="flex justify-end pt-4">
          <button
            type="button"
            (click)="siguientePaso()"
            [disabled]="!validarPaso1()"
            [class]="validarPaso1() ? 'bg-blue-500 hover:bg-blue-600 cursor-pointer' : 'bg-gray-300 cursor-not-allowed'"
            class="px-8 py-3 rounded-md font-semibold text-white transition-colors">
            Siguiente
          </button>
        </div>
      </form>

      <!-- Formulario Paso 2 -->
      <form *ngIf="paso === 2" class="space-y-4">
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Precio por noche <span class="text-red-500">*</span>
            </label>
            <input
              type="number"
              [(ngModel)]="precioNoche"
              name="precioNoche"
              class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="$1000">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Habitaciones <span class="text-red-500">*</span>
            </label>
            <input
              type="number"
              [(ngModel)]="numeroHabitaciones"
              name="numeroHabitaciones"
              class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="2">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Baños <span class="text-red-500">*</span>
            </label>
            <input
              type="number"
              [(ngModel)]="numeroBanos"
              name="numeroBanos"
              class="w-full px-4 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="1">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Imagen principal <span class="text-red-500">*</span>
          </label>
          <input
            type="file"
            (change)="onFileSelected($event, 1)"
            accept="image/*"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <p *ngIf="nombreImagen1" class="text-sm text-gray-600 mt-1">{{ nombreImagen1 }}</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Imagen 2
          </label>
          <input
            type="file"
            (change)="onFileSelected($event, 2)"
            accept="image/*"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <p *ngIf="nombreImagen2" class="text-sm text-gray-600 mt-1">{{ nombreImagen2 }}</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Imagen 3
          </label>
          <input
            type="file"
            (change)="onFileSelected($event, 3)"
            accept="image/*"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <p *ngIf="nombreImagen3" class="text-sm text-gray-600 mt-1">{{ nombreImagen3 }}</p>
        </div>

        <div class="flex justify-between pt-4">
          <button
            type="button"
            (click)="pasoAnterior()"
            class="px-8 py-3 rounded-md font-semibold text-gray-700 border border-gray-300 hover:bg-gray-50 cursor-pointer transition-colors">
            Atrás
          </button>

          <button
            type="button"
            (click)="registrarDepartamento()"
            [disabled]="!validarPaso2()"
            [class]="validarPaso2() ? 'bg-blue-500 hover:bg-blue-600 cursor-pointer' : 'bg-gray-300 cursor-not-allowed'"
            class="px-8 py-3 rounded-md font-semibold text-white transition-colors">
            Registrar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

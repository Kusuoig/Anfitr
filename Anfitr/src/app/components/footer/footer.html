<footer class="bg-white shadow-lg mt-auto border-t border-gray-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4 sm:gap-6">
      <!-- Logo y descripción -->
      <div class="text-center sm:text-left">
        <h3 class="text-xl sm:text-2xl font-bold mb-1 sm:mb-2" style="color: #152C5B;">
          <span>Anfi</span><span style="color: #3252DF;">tr.</span>
        </h3>
        <p class="text-sm sm:text-base text-gray-600">Comparte tu espacio con viajeros</p>
      </div>

      <!-- Call to action -->
      <div class="text-center sm:text-right w-full sm:w-auto">
        <p class="text-sm sm:text-base text-gray-700 mb-2 sm:mb-3 font-medium">
          Regístrate hoy haciendo
        </p>
        <button
          (click)="abrirRegistroDepartamento()"
          class="w-full sm:w-auto px-6 sm:px-8 py-2 sm:py-3 rounded-md font-semibold text-white hover:opacity-90 transition-opacity text-sm sm:text-base"
          style="background-color: #3252DF;">
          Comenzar ahora
        </button>
      </div>
    </div>
  </div>
</footer>

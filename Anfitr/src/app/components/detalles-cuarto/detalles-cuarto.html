
<app-navbar></app-navbar>
<div class="min-h-screen flex flex-col">

  <main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-6">
      <!-- Breadcrumb y Título -->
      <div class="mb-4 sm:mb-6">
        <div class="flex items-center gap-2 mb-2 sm:mb-3">
          <button
            (click)="irAInicio()"
            class="text-gray-600 hover:text-gray-900 text-xs sm:text-sm">
            Inicio
          </button>
          <span class="text-gray-400">/</span>
          <button class="text-xs sm:text-sm font-semibold" style="color: #152C5B;">
            Detalles del cuarto
          </button>
        </div>

        <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-center" style="color: #152C5B;">
          {{ propiedad?.titulo }}
        </h1>

        <p class="text-center text-gray-400 text-xs sm:text-sm mt-1">
          {{ propiedad?.ubicacion }}
        </p>
      </div>

      <!-- Contenedor de Imágenes -->
      <div class="flex flex-col md:flex-row gap-2 mb-6 sm:mb-8 w-full">
        <!-- Imagen Grande Izquierda -->
        <div class="w-full md:w-1/2">
          <img
            [src]="imagenes[0]"
            alt="Imagen principal"
            class="w-full h-64 sm:h-80 md:h-96 lg:h-[500px] object-cover rounded-lg md:rounded-l-lg md:rounded-r-none">
        </div>

        <!-- Columna Derecha con 2 Imágenes -->
        <div class="w-full md:w-1/2 flex flex-row md:flex-col gap-2">
          <div class="w-1/2 md:w-full">
            <img
              [src]="imagenes[1]"
              alt="Imagen 2"
              class="w-full h-32 sm:h-40 md:h-48 lg:h-[248px] object-cover rounded-lg md:rounded-tr-lg md:rounded-bl-none">
          </div>
          <div class="w-1/2 md:w-full">
            <img
              [src]="imagenes[2]"
              alt="Imagen 3"
              class="w-full h-32 sm:h-40 md:h-48 lg:h-[248px] object-cover rounded-lg md:rounded-br-lg md:rounded-tl-none">
          </div>
        </div>
      </div>

      <!-- Descripción y Precio -->
      <div class="flex flex-col lg:flex-row justify-between items-start gap-6 mb-6 sm:mb-8  p-4 sm:p-6 rounded-lg">
        <div class="flex-1 w-full">
          <h2 class="text-xl sm:text-2xl font-bold mb-2 sm:mb-3" style="color: #152C5B;">Sobre el cuarto</h2>
          <p class="text-sm sm:text-base text-gray-700 leading-relaxed">
            {{ propiedad?.descripcion }}
          </p>
        </div>

        <div class="w-full lg:w-auto text-center lg:text-right  p-4 rounded-lg lg:ml-6">
          <div class="mb-3 sm:mb-4">
            <span class="text-2xl sm:text-3xl font-bold" style="color: #1ABC9C;">${{ propiedad?.precio }} MXN</span>
            <span class="text-gray-500 text-xs sm:text-sm block mt-1">por día</span>
          </div>
          <button
            (click)="irAPagos()"
            class="w-full lg:w-auto px-6 sm:px-8 py-2 sm:py-3 rounded-md font-semibold text-white hover:opacity-90 transition-opacity text-sm sm:text-base"
            style="background-color: #3252DF;">
            Reservar
          </button>
        </div>
      </div>

      <!-- Otras Propiedades -->
      <div class="mb-6 sm:mb-8">
        <h3 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6" style="color: #152C5B;">Otras propiedades</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-4">
          <div
            *ngFor="let prop of otrasProPiedades.slice(0, 4)"
            (click)="verDetalles(prop.id)"
            class="bg-white rounded-lg overflow-hidden shadow-md hover:shadow-lg transition-shadow cursor-pointer">
            <img
              [src]="prop.imgUrl"
              [alt]="prop.titulo"
              class="w-full h-40 sm:h-48 object-cover">
            <div class="p-3 sm:p-4">
              <h4 class="font-semibold text-sm sm:text-base mb-1" style="color: #152C5B;">{{ prop.titulo }}</h4>
              <p class="text-xs text-gray-500">{{ prop.ubicacion }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <app-footer></app-footer>
</div>

<div class="min-h-screen bg-gray-50">
  <!-- Navbar -->
  <nav class="bg-white shadow-sm py-4">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
      <h1 class="text-3xl font-bold cursor-pointer" (click)="volver()">
        <span style="color: #152C5B;">Anfi</span><span style="color: #3252DF;">tr</span>
      </h1>
      <button (click)="volver()" class="text-gray-600 hover:text-gray-800">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </nav>

  <div class="max-w-3xl mx-auto px-4 py-8">
    <!-- Alerta -->
    <div *ngIf="mostrarAlerta" [ngClass]="{
      'bg-green-50 border-green-500 text-green-800': tipoAlerta === 'success',
      'bg-red-50 border-red-500 text-red-800': tipoAlerta === 'error'
    }" class="border-l-4 p-4 mb-6 rounded-lg shadow-md">
      <div class="flex justify-between items-start">
        <div class="flex">
          <svg *ngIf="tipoAlerta === 'success'" class="h-6 w-6 mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          <svg *ngIf="tipoAlerta === 'error'" class="h-6 w-6 mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          <p class="font-semibold">{{ mensajeAlerta }}</p>
        </div>
        <button (click)="cerrarAlerta()" class="text-gray-400 hover:text-gray-600">
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Título -->
    <h2 class="text-3xl font-bold mb-8" style="color: #152C5B;">
      Configuración
    </h2>

    <div class="bg-white rounded-lg shadow-lg p-8">
      <!-- Información Personal -->
      <div class="mb-8">
        <h3 class="text-xl font-bold mb-4" style="color: #152C5B;">Información Personal</h3>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
            <input 
              type="text" 
              [(ngModel)]="nombre"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Juan Pérez">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
            <input 
              type="email" 
              [(ngModel)]="email"
              disabled
              class="w-full px-4 py-2 border border-gray-300 bg-gray-100 rounded-lg cursor-not-allowed"
              placeholder="ejemplo@correo.com">
            <p class="text-xs text-gray-500 mt-1">El correo no se puede modificar</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
            <input 
              type="tel" 
              [(ngModel)]="telefono"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="5512345678">
          </div>
        </div>
      </div>

      <!-- Cambiar Contraseña -->
      <div class="mb-8">
        <h3 class="text-xl font-bold mb-4" style="color: #152C5B;">Cambiar Contraseña</h3>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña actual</label>
            <input 
              type="password" 
              [(ngModel)]="passwordActual"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="••••••••">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
            <input 
              type="password" 
              [(ngModel)]="passwordNueva"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="••••••••">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar nueva contraseña</label>
            <input 
              type="password" 
              [(ngModel)]="passwordConfirmar"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="••••••••">
          </div>
        </div>
      </div>

      <!-- Botones -->
      <div class="flex gap-4">
        <button 
          (click)="guardarCambios()"
          [disabled]="guardando"
          class="flex-1 px-6 py-3 rounded-lg font-semibold text-white text-lg hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed"
          style="background-color: #3252DF;">
          <span *ngIf="!guardando">Guardar cambios</span>
          <span *ngIf="guardando">Guardando...</span>
        </button>
        
        <button 
          (click)="volver()"
          class="px-6 py-3 rounded-lg font-semibold text-gray-600 border-2 border-gray-300 hover:bg-gray-50 transition-colors">
          Cancelar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="min-h-screen">
  <nav class="bg-white shadow-sm py-4">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <h1 class="text-3xl font-bold">
        <span style="color: #152C5B;">Anfi</span><span style="color: #3252DF;">tr</span>
      </h1>
    </div>
  </nav>

  <div class="max-w-7xl cursor-default mx-auto px-4 py-8">
    <!-- Alerta de éxito/error -->
    <div *ngIf="mostrarAlerta" [ngClass]="{
      'bg-green-50 border-green-500 text-green-800': tipoAlerta === 'success',
      'bg-red-50 border-red-500 text-red-800': tipoAlerta === 'error'
    }" class="border-l-4 p-4 mb-6 rounded-lg shadow-md">
      <div class="flex justify-between items-start">
        <div class="flex">
          <svg *ngIf="tipoAlerta === 'success'" class="h-6 w-6 mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          <svg *ngIf="tipoAlerta === 'error'" class="h-6 w-6 mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          <p class="font-semibold">{{ mensajeAlerta }}</p>
        </div>
        <button (click)="cerrarAlerta()" class="text-gray-400 hover:text-gray-600">
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="flex items-center justify-center mb-8">
      <div class="flex items-center">
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-full bg-[#1ABC9C] flex items-center justify-center text-white font-bold">✓</div>
        </div>
        <div class="w-16 md:w-24 h-1 bg-[#1ABC9C] mx-2"></div>
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-full bg-[#1ABC9C] flex items-center justify-center text-white font-bold">2</div>
        </div>
        <div class="w-16 md:w-24 h-1 bg-gray-300 mx-2"></div>
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-full bg-gray-300 flex items-center justify-center text-white font-bold">3</div>
        </div>
      </div>
    </div>

    <h2 class="text-2xl md:text-3xl font-bold text-center mb-8" style="color: #152C5B;">
      Pago
    </h2>

    <div class="mx-auto overflow-hidden">
      <div class="flex flex-col md:flex-row">
        <div class="w-full md:w-1/2 p-6 md:p-8 flex flex-col justify-center">
          <h3 class="text-xl font-bold mb-4" style="color: #152C5B;">Resumen de compra</h3>
          <div class="space-y-3">
            <p class="text-gray-700 text-lg">
              <span class="font-semibold">{{ meses }}</span> {{ textoMeses }} en
              <span class="font-semibold">{{ propiedad?.titulo }}</span>
            </p>
            <p class="text-sm text-gray-500">{{ propiedad?.ubicacion }}</p>
            <p class="text-xs text-gray-400">
              {{ fechaInicio }} al {{ fechaFin }}
            </p>
          </div>

          <div class="border-t mt-6 pt-6">
            <div class="flex justify-between items-center">
              <span class="text-xl md:text-2xl font-bold" style="color: #152C5B;">Total:</span>
              <span class="text-2xl md:text-3xl font-bold" style="color: #1ABC9C;">${{ total }} MXN</span>
            </div>
          </div>
        </div>

        <div class="hidden md:block w-px bg-gray-300"></div>

        <div class="w-full md:w-1/2 p-6 md:p-8">
          <h3 class="text-lg font-bold mb-4" style="color: #152C5B;">Datos bancarios</h3>
          <form class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del propietario</label>
              <input type="text" [(ngModel)]="nombreTarjeta" name="nombreTarjeta" placeholder="Juan Pérez" class="w-full px-3 py-2 border border-gray-300 bg-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Número de tarjeta</label>
              <input type="text" [(ngModel)]="numeroTarjeta" (input)="formatearNumeroTarjeta()" name="numeroTarjeta" placeholder="1234 5678 9012 3456" maxlength="16" class="w-full px-3 py-2 border border-gray-300 bg-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Banco</label>
              <input type="text" [(ngModel)]="banco" name="banco" placeholder="Nombre del banco" class="w-full px-3 py-2 border border-gray-300 bg-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex gap-3">
              <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de vencimiento</label>
                <input
                type="text"
                [(ngModel)]="fechaVencimiento"
                name="fechaVencimiento"
                placeholder="MM/AA"
                maxlength="5"
                (input)="formatearFechaVencimiento($event)"
                class="w-full px-3 py-2 border border-gray-300 bg-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
              <div class="w-24">
                <label class="block text-sm font-medium text-gray-700 mb-1">CVV</label>
                <input type="text" [(ngModel)]="cvv" name="cvv" placeholder="123" maxlength="3" class="w-full px-3 py-2 border border-gray-300 bg-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="flex flex-col items-center gap-3 mt-8">
      <button (click)="pagarAhora()" [disabled]="procesandoPago" class="w-full max-w-sm px-12 py-3 rounded-lg cursor-pointer font-semibold text-white text-lg hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed" style="background-color: #3252DF;">
        <span *ngIf="!procesandoPago">Pagar ahora</span>
        <span *ngIf="procesandoPago">Procesando...</span>
      </button>
      <button (click)="cancelar()" class="px-12 py-3 text-gray-400 font-semibold text-md cursor-pointer hover:text-gray-300">
        Cancelar
      </button>
    </div>
  </div>
</div>

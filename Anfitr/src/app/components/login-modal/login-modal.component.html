<div class="flex font-poppins">
  <!-- Izquierda: Logo -->
  <div class="w-1/2 flex items-center justify-center bg-white py-12">
    <h1 class="text-[80px] font-medium">
      <span class="text-[#3252DF]">Anfi</span><span class="text-[#152C5B]">tr</span>
    </h1>
  </div>

  <!-- Derecha: Formulario -->
  <div class="w-1/2 flex items-center justify-center bg-white py-12">
    <div class="w-3/4 max-w-md px-4">
      <!-- Título centrado dentro de su área -->
      <h2 class="text-[40px] font-medium text-center mb-6">Ingresar</h2>

      <form (ngSubmit)="login()">
        <!-- Usuario -->
        <div class="mb-4">
          <label class="block text-[24px] font-normal mb-1">Usuario (Email)</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="ejemplo@correo.com"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003DFC] placeholder-[#D2D2D2] text-[22px]"
          />
        </div>

        <!-- Contraseña -->
        <div class="mb-2 relative">
          <label class="block text-[24px] font-normal mb-1">Contraseña</label>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="8+ caracteres"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003DFC] placeholder-[#D2D2D2] text-[22px]"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-[38px] text-[#D2D2D2]"
          >
          </button>
        </div>

        <!-- Mensaje de error -->
        <p *ngIf="errorMessage" class="text-red-500 text-sm mb-2">{{ errorMessage }}</p>

        <!-- Términos -->
        <p class="text-[15px] text-black mb-4">
          Al ingresar aceptas los términos y condiciones La Salle Oaxaca.
        </p>

        <!-- Usuarios de prueba -->
        <!-- <div class="bg-gray-100 p-3 rounded-lg mb-4">
          <p class="text-xs font-semibold mb-1">Usuarios de prueba:</p>
          <p class="text-xs">juan@example.com / 123456</p>
          <p class="text-xs">maria@example.com / 123456</p>
          <p class="text-xs">carlos@example.com / 123456</p>
        </div> -->

        <!-- Botón Ingresar -->
        <button
          type="submit"
          class="w-full bg-[#003DFC] cursor-pointer text-white py-2 rounded-lg hover:bg-[#002bbf] transition mb-4 text-[30px]"
        >
          Ingresar
        </button>

        <p
          class="text-center text-gray-500 hover:text-gray-700 cursor-pointer text-[24px]"
          (click)="switchToRegister()"
        >
          Crear Cuenta
        </p>
      </form>
    </div>
  </div>
</div>

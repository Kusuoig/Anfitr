<nav class="bg-white text-principal font-normal shadow-sm  w-full top-0 z-1">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between py-3 sm:py-4">
      <!-- Logo -->
      <a class="text-principal text-3xl sm:text-3xl font-bold" href="#">
        <span>Anfi</span><span class="text-secundario">tr</span>
      </a>

      <button
        class="text-principal lg:hidden p-2"
        type="button"
        (click)="toggleMobileMenu()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <!-- Menú desktop -->
      <div class="hidden lg:flex items-center gap-4">
        <ul class="flex space-x-1">
          @for(item of menuList; track $index){
          <li>
            <a class="block  py-2 px-3 text-principal font-bold rounded  ease-in-out hover:scale-110 duration-100 hover:text-[#3252DF] cursor-pointer"
               routerLinkActive="text-secundario font-semibold"
               [routerLink]="item.path === 'acercade' ? null : item.path"
               (click)="item.path === 'acercade' ? scrollToSection('acercade') : null">
              {{ item.name }}
            </a>
          </li>
          }
        </ul>

        <!-- Botón de login o perfil según el estado -->
        <div *ngIf="!usuarioActual">
          <button
            class="bg-secundario  text-white font-semibold py-2 px-3 rounded cursor-pointer hover:bg-opacity-90 transition ease-in-out hover:scale-105 duration-100"
            (click)="openLoginModal()">
            Iniciar sesión
          </button>
        </div>

        <div *ngIf="usuarioActual" class=" relative">
          <button
            (click)="toggleMenuPerfil()"
            class="flex items-center cursor-pointer gap-2 transition py-2 px-3 rounded-lg hover:scale-105 duration-100">
            <img
              [src]="usuarioActual.fotoPerfil"
              [alt]="usuarioActual.nombre"
              class="w-10 h-10 rounded-full object-cover border-2 border-gray-300">
            <span class="font-medium text-principal hidden xl:inline">{{ usuarioActual.nombre }}</span>
            <svg class="w-4 h-4 text-gray-600 hidden xl:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Menú desplegable del perfil -->
          <div *ngIf="mostrarMenuPerfil"
               class="absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-2 z-50 animate-slideDown">
            <button
              (click)="irAPerfil()"
              class="w-full text-left cursor-pointer px-4 py-2 hover:bg-gray-100 flex items-center gap-3 transition">
              <svg class="w-5 h-5 text-principal" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
              <span class="text-principal">Mi Perfil</span>
            </button>
            <button
              (click)="irAConfiguracion()"
              class="w-full text-left px-4 cursor-pointer py-2 hover:bg-gray-100 flex items-center gap-3 transition">
              <svg class="w-5 h-5 text-principal" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
              <span class="text-principal">Configuración</span>
            </button>
            <hr class="my-2 border-gray-200">
            <button
              (click)="cerrarSesion()"
              class="w-full text-left cursor-pointer px-4 py-2 hover:bg-red-50 flex items-center gap-3 transition text-red-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
              </svg>
              <span>Cerrar Sesión</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Menú móvil -->
    <div
      [class.hidden]="!isMobileMenuOpen"
      class="lg:hidden pb-4 border-t border-gray-200">
      <ul class="space-y-1 pt-4">
        @for(item of menuList; track $index){
        <li>
          <a class="block py-2 px-4 text-principal rounded transition-colors duration-200 hover:bg-gray-100 cursor-pointer"
             routerLinkActive="text-secundario font-semibold"
             [routerLink]="item.path === 'acercade' ? null : item.path"
             (click)="item.path === 'acercade' ? scrollToSection('acercade') : null; closeMobileMenu()">
            {{ item.name }}
          </a>
        </li>
        }
      </ul>

      <!-- Botón de login o perfil en móvil -->
      <div class="mt-4 px-4" *ngIf="!usuarioActual">
        <button
          class="w-full bg-secundario text-white py-2 px-4 rounded cursor-pointer hover:bg-opacity-90 transition"
          (click)="openLoginModal(); closeMobileMenu()">
          Iniciar sesión
        </button>
      </div>

      <div class="mt-4 px-4" *ngIf="usuarioActual">
        <button
          (click)="irAPerfil(); closeMobileMenu()"
          class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 transition">
          <img
            [src]="usuarioActual.fotoPerfil"
            [alt]="usuarioActual.nombre"
            class="w-12 h-12 rounded-full object-cover border-2 border-gray-300">
          <span class="font-medium text-principal">{{ usuarioActual.nombre }}</span>
        </button>
      </div>
    </div>
  </div>
</nav>

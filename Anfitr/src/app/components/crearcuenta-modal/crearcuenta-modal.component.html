<div class="flex font-poppins">
  <!-- Izquierda: Logo -->
  <div class="w-1/2 flex items-center justify-center bg-white py-12">
    <h1 class="text-[80px] font-medium">
      <span class="text-[#3252DF]">Anfi</span><span class="text-[#152C5B]">tr</span>
    </h1>
  </div>

  <!-- Derecha: Formulario -->
  <div class="w-1/2 flex items-center justify-center bg-white py-12">
    <div class="w-3/4 max-w-md px-4">
      <!-- Título centrado dentro de su área -->
      <h2 class="text-[40px] font-medium text-center mb-6">Crear cuenta</h2>

      <form (ngSubmit)="register()">
        <!-- Nombre -->
        <div class="mb-4">
          <label class="block text-[24px] font-normal mb-1">Nombre *</label>
          <input
            type="text"
            [(ngModel)]="nombre"
            name="nombre"
            placeholder="Ingrese su nombre"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003DFC] placeholder-[#D2D2D2] text-[22px]"
          />
        </div>

        <!-- E-mail -->
        <div class="mb-4">
          <label class="block text-[24px] font-normal mb-1">E-mail *</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="ejemplo@gmail.com"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003DFC] placeholder-[#D2D2D2] text-[22px]"
          />
        </div>

        <!-- Número de Teléfono -->
        <div class="mb-4">
          <label class="block text-[24px] font-normal mb-1">Número de Teléfono (opcional)</label>
          <input
            type="tel"
            [(ngModel)]="telefono"
            name="telefono"
            placeholder="Con código telefónico de país"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003DFC] placeholder-[#D2D2D2] text-[22px]"
          />
        </div>

        <!-- Nombre de Usuario -->
        <div class="mb-4">
          <label class="block text-[24px] font-normal mb-1">Nombre de Usuario (opcional)</label>
          <input
            type="text"
            [(ngModel)]="nombreUsuario"
            name="nombreUsuario"
            placeholder="Nombre de usuario"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003DFC] placeholder-[#D2D2D2] text-[22px]"
          />
        </div>

        <!-- Contraseña -->
        <div class="mb-2 relative">
          <label class="block text-[24px] font-normal mb-1">Contraseña *</label>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="6+ caracteres"
            required
            minlength="6"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003DFC] placeholder-[#D2D2D2] text-[22px]"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-[38px] text-[#D2D2D2]"
          >
          </button>
        </div>

        <!-- Mensaje de error -->
        <p *ngIf="errorMessage" class="text-red-500 text-sm mb-2">{{ errorMessage }}</p>

        <!-- Mensaje de éxito -->
        <p *ngIf="successMessage" class="text-green-500 text-sm mb-2">{{ successMessage }}</p>

        <!-- Términos -->
        <p class="text-[15px] text-black mb-4">
          Al ingresar aceptas los términos y condiciones La Salle Oaxaca.
        </p>

        <!-- Botón Registrarse -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-[#003DFC] text-white py-2 rounded-lg hover:bg-[#002bbf] transition mb-4 text-[30px] disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isLoading ? 'Registrando...' : 'Registrarse' }}
        </button>

        <p
          class="text-center text-black underline cursor-pointer text-[24px]"
          (click)="switchToLogin()"
        >
          Iniciar Sesión
        </p>
      </form>
    </div>
  </div>
</div>
